<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div id="top-page">
        <section id="navigation-section">
            <header>
                <nav class="navbar">
                    <div class="name-container">
                        <p class="name">Steev_Art</p>
                        <p class="job">Visual artist</p>
                    </div>
                    <div class="nav-links-container">
                        <ul>
                            <li>
                                <a class="nav-link" href="#portfolio-section">Portfolio</a>
                                <div class="underline"></div>
                            </li>
                            <li>
                                <a class="nav-link" href="#">Work In Progress</a>
                                <div class="underline"></div>
                            </li>
                            <li>
                                <a class="nav-link" href="#">Personal Projects</a>
                                <div class="underline"></div>
                            </li>
                            <li>
                                <a class="nav-link" href="#">Contact</a>
                                <div class="underline"></div>
                            </li>
                        </ul>
                    </div>
                    <div class="socials-links-container">
                        <a class="social-link" href="https://www.instagram.com/steev_art_/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a class="social-link" href="https://x.com/SteevArt_" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                        <a class="social-link" href="https://www.tiktok.com/@steevart_official" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                        <a class="social-link" href="https://www.youtube.com/channel/UCs09fvIFYWLV6ae7Nh1mrIQ" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </nav>
            </header>
        </section>

            <div class="pres-container">
                <h1 class="pres">Hi, My name is Steven !</h1>
                <p class="text">I'm a visual artist from Quebec Canada and I love art.</p>
                <img class="profile-img" src="assets/steve-logo.jpg">
            </div>   
        </section>  
    </div>

    <section id="portfolio-section">
        <h2>Portfolio</h2>
        <div class="projects-container">
            <div class="separator"></div>

            <div class="project">
                <img class="project-img" src="assets/projects-img/img-1.jpg" alt="">
                <p class="project-title">Girl watching through window</p>
            </div>
            <div class="project">
                <img class="project-img" src="assets/projects-img/img-2.jpg" alt="">
                <p class="project-title">Medieval stairs</p>
            </div>
            <div class="project">
                <img class="project-img" src="assets/projects-img/img-3.jpg" alt="">
                <p class="project-title">View on a lake</p>
            </div>
            <div class="project">
                <img class="project-img" src="assets/projects-img/img-4.jpg" alt="">
                <p class="project-title">Abandoned city</p>
            </div>
            <div class="project">
                <img class="project-img" src="assets/projects-img/img-5.jpg" alt="">
                <p class="project-title">Spaceship in space</p>
            </div>
            
        </div>
    </section>
